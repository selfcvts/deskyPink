# Hyprland configuration file - Astolfo Theme
#
# A feminine, Astolfo-inspired Hyprland theme with pink and purple accents.
# Designed for daily use on Arch Linux with a cute aesthetic.

# General Settings
exec-hook = pre exec mkdir -p $XDG_RUNTIME_DIR/hypr
exec-once = nm-applet &
exec-once = blueman-applet &
exec-once = volumeicon &
exec-once = pamac-tray &
exec-once = xfce4-power-manager &
exec-once = dunst &
exec-once = hyprpaper -c ~/.config/hypr/hyprpaper.conf

# Input
input {
    kb_layout us
    follow_mouse 1
}

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size 2
    # Astolfo colors: Pink and Purple theme
    col.active_border rgba(244,143,177,0.8)      # #F48FB1 - Astolfo Pink
    col.inactive_border rgba(30,30,30,0.6)
    layout dwindle
}

# Monitor (adjust resolution as needed)
monitor = ,preferred,auto,1

# Keybindings
# Super (Windows) key
set $mod MOD4

# Launch terminal
bind $mod, RETURN, exec alacritty
# Launch rofi (app launcher)
bind $mod, D, exec rofi -show drun
# Close window
bind $mod, SHIFT, Q, kill
# Layout switching
bind $mod, SPACE, togglelayout
# Reload Hyprland
bind $mod, SHIFT, F10, reload
# Exit Hyprland
bind $mod, SHIFT, E, exec echo "Executing exit" && hyprctl exit

# Workspace settings
workspace 1, default
workspace 2, web
workspace 3, code
workspace 4, chat
workspace 5, media
workspace 6, misc

# Window rules
windowrulev2 = floated, ^(floatterm)$
windowrulev2 = pixelperfect, ^(pavucontrol)$

# Animations
animation {
    bezier 0.05, 0.8, 0.1, 1
    duration 300
}

# Decoration
decoration {
    rounding 10
    shadow_range 8
    shadow_render_power 3
    blur_size 8
    blur_passes 2
    blur_size_x2
    blur_sigma
    col.active_border rgba(244,143,177,0.8)      # #F48FB1 - Astolfo Pink
    col.inactive_border rgba(30,30,30,0.6)
    col.active_bg rgba(30,30,30,0.8)
    col.inactive_bg rgba(20,20,20,0.6)
}
