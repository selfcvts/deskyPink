# hyprpaper config - Wallpaper engine for Hyprland
# Path to wallpaper - Astolfo theme
wallpaper = ,~/hyperland-theme/wallpaper/wallpaper1.jpg

# Optional: set different wallpapers per monitor
# wallpaper = HDMI-A-1,~/wallpapers/other.jpg

# Background color if image doesn't fill screen
bg_color = #F48FB1

# Optional: background scaling (fill, fit, stretch, tile, center)
scaling = fill

# Optional: colorizer (e.g., to tint wallpaper)
# colorizer =

# Alternative wallpapers available in ~/hyperland-theme/wallpaper/:
# wallpaper2.jpg - diagonal gradient
# wallpaper3.jpg - multi-stop gradient  
# wallpaper4.jpg - radial gradient
# wallpaper.svg - animated SVG with sparkles
