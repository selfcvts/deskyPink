# Astolfo Dots-Hyprland Configuration
# Inspired by end-4's dots-hyprland + SFW Astolfo theme
# Palette: Baby Pink (#FFB6C1) + Lavender (#E6E6FA) + Blush (#FFF0F5)

$baby_pink = #FFB6C1
$lavender  = #E6E6FA
$blush     = #FFF0F5
$text      = #333333
$transparent = #00000000

# =============== BASIC SETTINGS ===============
exec-once = hyprctl keyword animation Bezier, 10, 0.1, 0.0, 1.0  # Snappy dots
exec-once = hyprctl keyword decorate { rounding 6; shadow_range 6; shadow_power 1.5; shadow_color $lavender30; }
exec-once = hyprctl keyword general { gaps_in 6; gaps_out 10; border_size 1; }
exec-once = hyprctl keyword input { kb_layout us; follow_mouse 1; }
exec-once = hyprctl keyword pixel_rounding 0

# =============== BORDERS & SHADOWS (SOFT) ===============
general {
    col.active_border   = $baby_pink
    col.inactive_border = $lavender40
    col.urgent_border   = $ff8c00  # Soft orange for urgency (not harsh red)
}

decoration {
    rounding       = 6
    shadow_range   = 6
    shadow_power   = 1.5
    shadow_color   = $lavender20
    blur           = yes
    blur_size      = 4
    brightness     = 0.9
    background     = $transparent
    border_size    = 1
    border_color   = $baby_pink
}

# =============== EXEC-ONCE (STARTUP) ===============
exec-once = waybar &
exec-once = wtypeset -r 180 &  # Extra slow cursor for dreamy feel
exec-once = hypridle &
exec-once = hyprlock &
exec-once = hyprpaper &
exec-once = grimblast &
exec-once = nm-applet &
exec-once = pamac-tray &
exec-once = blueman-tray &
exec-once = nextcloud &
exec-once = playerctld daemon

# =============== KEYBINDINGS (ASTOLOF-THEMED) ===============
$mod = SUPER

# Launchers
bind = $mod, RETURN, exec, alacritty
bind = $mod, SPACE, exec, wofi --show drun
bind = $mod, SHIFT, SPACE, exec, rofi -show drun -theme-str '@import "~/.config/rofi/config.rasi"'

# App shortcuts (with Astolfo whimsy)
bind = $mod, A, exec, flatpak run com.discordapp.Discord
bind = $mod, B, exec, floorp
bind = $mod, C, exec, code
bind = $mod, D, exec, thunar
bind = $mod, E, exec, pavucontrol
bind = $mod, F, exec, flameshot gui
bind = $mod, G, exec, gimp
bind = $mod, H, exec, hyprctl keyword animation Bezier, 10, 0.2, 0.0, 1.0; notify -t 3000 "Animation" "Smooth mode"
bind = $mod, J, exec, hyprctl keyword animation Bezier, 10, 0.05, 0.0, 1.0; notify -t 3000 "Animation" "Crisp mode"
bind = $mod, K, exec, kdeconnect-indicator
bind = $mod, L, exec, hyprlock
bind = $mod, M, exec, pavucontrol
bind = $mod, N, exec, nm-connection-editor
bind = $mod, O, exec, obs
bind = $mod, P, exec, flatpak run com.spotify.Client
bind = $mod, Q, exec, hyprctl dispatch exit
bind = $mod, R, exec, alacritty -e bashtop
bind = $mod, S, exec, flameshot full -p ~/Pictures/Screenshots
bind = $mod, T, exec, thunar
bind = $mod, U, exec, uninstaller
bind = $mod, V, exec, pavucontrol
bind = $mod, W, exec, wlogout
bind = $mod, X, exec, xkill
bind = $mod, Y, exec, yad --noescapeexit
bind = $mod, Z, exec, zoom

# Workspace controls
bind = $mod, TAB, exec, hyprctl dispatch nextworkspace
bind = $mod, SHIFT, TAB, exec, hyprctl dispatch prevworkspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod, SHIFT, 1, movetoworkspace, 1
bind = $mod, SHIFT, 2, movetoworkspace, 2
bind = $mod, SHIFT, 3, movetoworkspace, 3
bind = $mod, SHIFT, 4, movetoworkspace, 4
bind = $mod, SHIFT, 5, movetoworkspace, 5
bind = $mod, SHIFT, 6, movetoworkspace, 6
bind = $mod, SHIFT, 7, movetoworkspace, 7
bind = $mod, SHIFT, 8, movetoworkspace, 8
bind = $mod, SHIFT, 9, movetoworkspace, 9
bind = $mod, SHIFT, 0, movetoworkspace, 10

# Window controls
bind = $mod, Q,         killactive
bind = $mod, SHIFT, Q,  killactive
bind = $mod, F,         togglefloating
bind = $mod, SHIFT, F,  togglefullscreen
bind = $mod, D,         splittoggle
bind = $mod, SHIFT, D,  splittoggle
bind = $mod, C,         resizewindow, 50 50
bind = $mod, SHIFT, C,  resizewindow, 0 0

# Scratchpads (Astolfo-themed names)
bind = $mod, grave,     exec, alacritty --title "astolfo_ribbon" -e bash -c "neofetch --ascii_distro 'tiny' --ascii_colors $baby_pink $lavender $white; bash"
bind = $mod, SHIFT, grave, togglespecialworkspace, "astolfo_ribbon"

# Media & Volume
bind = , XF86AudioRaiseVolume, exec, $HOME/.config/waybar/scripts/dots_volume.sh up
bind = , XF86AudioLowerVolume, exec, $HOME/.config/waybar/scripts/dots_volume.sh down
bind = , XF86AudioMute,    exec, $HOME/.config/waybar/scripts/dots_volume.sh mute
bind = , XF86AudioPlay,    exec, playerctl play-pause
bind = , XF86AudioNext,    exec, playerctl next
bind = , XF86AudioPrev,    exec, playerctl previous

# Screenshots (dot-style feedback)
bind = $mod, SHIFT, S, exec, grimblast save area && notify -t 2000 "Screenshot" "Area captured ●"
bind = $mod, S,         exec, grimblast save screen && notify -t 2000 "Screenshot" "Full screen ●●●"

# Reload config
bind = $mod, SHIFT, C,  exec, hyprctl reload

# =============== WORKSPACE RULES (ASTOLOF TRAITS) ===============
workspace = 1, name: 🌸  # Kindness
workspace = 2, name: 💻  # Creativity
workspace = 3, name: 💬  # Friendship
workspace = 4, name: 🎧  # Music
workspace = 5, name: 🎮  # Playfulness
workspace = 6, name: 🔧  # Curiosity
workspace = 7, name: ⚙️  # Diligence
workspace = 8, name: 🌴  # Relaxation
workspace = 9, name: 📚  # Knowledge
workspace = 10, name: 🎀  # Ribbons (Astolfo's signature)

# App-to-workspace rules
windowrulev2 = workspace 1 silent, title:^(.*Firefox|.*Chromium|.*Floorp).*$
windowrulev2 = workspace 2 silent, title:^(.*Code|.*VSCodium|.*Sublime).*$
windowrulev2 = workspace 3 silent, title:^(.*Discord|.*TelegramDesktop|.*Slack).*$
windowrulev2 = workspace 4 silent, title:^(.*Spotify|.*VLC|.*mpv).*$
windowrulev2 = workspace 5 silent, title:^(.*Steam|.*Lutris|.*Heroic).*$
windowrulev2 = workspace 6 silent, title:^(.*GitKraken|.*DBeaver|.*Postman).*$
windowrulev2 = workspace 7 silent, title:^(.*Blueman-manager|.*GParted|.*Synaptic).*$
windowrulev2 = workspace 8 silent, title:^(.*VirtualBox Manager|.*Virt-manager).*$
windowrulev2 = workspace 9 silent, title:^(.*Gimp|.*Inkscape|.*Blender).*$
windowrulev2 = workspace 10 silent, title:^(.*alacritty.*astrolo_ribbon).*$

# =============== FLOATING WINDOWS ===============
float = ^(alacritty.*astrolo_ribbon|nm-connection-editor|pavucontrol|blueman-manager|xfce4-power-manager-settings)$
float = ^(wl-clipboard-history|wofi|rofi|swaync)$

# ==============- DECORATION RULES ===============
decoration = {
    active_border_color = $baby_pink
    inactive_border_color = $lavender50
    border_size = 1
    rounding = 6
}

# =============== MISC ===============
misc = {
    hide_lock_screen = true
    cursor_gap = 0
    enable_borderless_wlroots = false
}