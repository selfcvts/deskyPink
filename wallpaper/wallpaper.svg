<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F48FB1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="grad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <!-- Animated sparkling effect -->
  <g id="sparkles">
    <circle cx="480" cy="270" r="2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="1440" cy="400" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="800" cy="700" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="1200" cy="300" r="1" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="600" cy="800" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="1500" cy="750" r="2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="300" cy="600" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="1700" cy="500" r="2" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- Decorative elements -->
  <ellipse cx="960" cy="540" rx="300" ry="150" fill="rgba(255,255,255,0.08)" />
  <path d="M 400 300 Q 500 100 600 300" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 1300 400 Q 1200 200 1100 400" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Text -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="48" font-family="Sans-Serif,Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,Android Emoji,EmojiSymbols,EmojiOne Color,Twemoji Mozilla,Segoe UI Symbol">♕ Astrolo Desktop ♕</text>
  
